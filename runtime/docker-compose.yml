services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maternity
      POSTGRES_USER: maternity
      POSTGRES_PASSWORD: maternity
    ports:
      - "15432:5432"
    volumes:
      - maternity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maternity -d maternity"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: runtime/docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/maternity
      DB_USERNAME: maternity
      DB_PASSWORD: maternity
      SECURITY_JWT_SECRET: runtime-compose-secret-change-me
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/client-api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  admin-web:
    build:
      context: ..
      dockerfile: runtime/docker/admin-web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4174:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  desktop-web:
    build:
      context: ..
      dockerfile: runtime/docker/desktop-web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4176:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  maternity-postgres-data:
