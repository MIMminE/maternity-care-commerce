name: backend-cd

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Test
        working-directory: backend
        run: ./gradlew test

      - name: Build jar
        working-directory: backend
        run: ./gradlew bootJar

      - name: Build Docker image
        working-directory: backend
        run: docker build -t ${{ secrets.DOCKER_IMAGE }} .

      - name: Save Docker image
        run: docker save ${{ secrets.DOCKER_IMAGE }} | gzip > backend-image.tar.gz

      - name: Upload image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend-image.tar.gz,infra/docker-compose.prod.yml
          target: ~/maternity-care-commerce

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/maternity-care-commerce
            docker load < backend-image.tar.gz
            docker compose -f infra/docker-compose.prod.yml up -d
            sleep 10
            curl -fsS http://localhost:8080/client-api/v1/health
