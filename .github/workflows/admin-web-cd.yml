name: admin-web-cd

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION_VALUE: ${{ secrets.AWS_REGION }}
      ADMIN_WEB_BUCKET_VALUE: ${{ secrets.ADMIN_WEB_BUCKET }}
      ADMIN_CLOUDFRONT_DISTRIBUTION_ID_VALUE: ${{ secrets.ADMIN_CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: admin-web
        run: npm install && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_VALUE }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_VALUE }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Explain skipped admin web deploy
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE == '' || env.AWS_SECRET_ACCESS_KEY_VALUE == '' || env.AWS_REGION_VALUE == '' || env.ADMIN_WEB_BUCKET_VALUE == '' }}
        run: |
          echo "Admin web deploy secrets are not fully configured."
          echo "Build validation completed, but S3 upload and CloudFront invalidation were skipped."

      - name: Upload to S3
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' && env.ADMIN_WEB_BUCKET_VALUE != '' }}
        run: aws s3 sync admin-web/dist "s3://${ADMIN_WEB_BUCKET_VALUE}" --delete

      - name: Invalidate CloudFront
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' && env.ADMIN_CLOUDFRONT_DISTRIBUTION_ID_VALUE != '' }}
        run: aws cloudfront create-invalidation --distribution-id "${ADMIN_CLOUDFRONT_DISTRIBUTION_ID_VALUE}" --paths "/*"
