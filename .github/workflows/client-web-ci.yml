name: client-web-ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'client-web/**'
      - '.github/workflows/client-web-ci.yml'
  pull_request:
    paths:
      - 'client-web/**'
      - '.github/workflows/client-web-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        working-directory: client-web
        run: npm install && npm run build
